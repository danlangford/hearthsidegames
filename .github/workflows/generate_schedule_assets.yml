name: Generate Schedule Assets

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-schedule-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python3 -m pip install pillow

      - name: Generate schedule images
        run: python3 scripts/generate_schedule_assets.py

      - name: Show generated asset diff
        run: git status --short pages/schedule/generated

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/schedule/generated

          if git diff --cached --quiet; then
            echo "No generated asset changes detected."
            exit 0
          fi

          echo "Committing generated asset changes:"
          git diff --cached --name-status
          git commit -m "Refresh generated schedule assets"
          git push "https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
