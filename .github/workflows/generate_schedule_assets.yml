name: Generate Schedule Assets

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-schedule-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Pillow
        run: python3 -m pip install pillow

      - name: Generate schedule images
        run: python3 scripts/generate_schedule_assets.py

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/schedule/generated

          if git diff --cached --quiet; then
            echo "No generated asset changes detected."
            exit 0
          fi

          git commit -m "Refresh generated schedule assets"
          git push origin HEAD:${{ github.ref_name }}
