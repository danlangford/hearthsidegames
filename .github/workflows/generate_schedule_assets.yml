name: Generate Schedule Assets

on:
  schedule:
    # Mountain-local target runs, paired for daylight and standard time.
    # 12:05 AM Mountain
    - cron: "5 6 * * *"
    - cron: "5 7 * * *"
    # 9:05 AM Mountain
    - cron: "5 15 * * *"
    - cron: "5 16 * * *"
    # 1:05 PM Mountain
    - cron: "5 19 * * *"
    - cron: "5 20 * * *"
    # 6:05 PM Mountain
    - cron: "5 0 * * *"
    - cron: "5 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-schedule-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Transform ICS to JSON
        run: python3 scripts/transform_ics_to_json.py

      - name: Check whether canonical schedule data changed
        id: data_diff
        run: |
          if git diff --quiet -- pages/schedule/generated; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          if git diff --quiet -- pages/schedule/generated/manifest.json 'pages/schedule/generated/week-*.json'; then
            echo "weekly_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "weekly_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show generated data diff
        run: git status --short pages/schedule/generated

      - name: Install Pillow
        if: steps.data_diff.outputs.changed == 'true'
        run: python3 -m pip install pillow

      - name: Transform JSON to PNG
        if: steps.data_diff.outputs.changed == 'true' && steps.data_diff.outputs.weekly_changed == 'true'
        run: python3 scripts/transform_json_to_png.py

      - name: Transform TV JSON to PNG
        if: steps.data_diff.outputs.changed == 'true' && steps.data_diff.outputs.weekly_changed == 'false'
        run: python3 scripts/transform_json_to_png.py --tv-only

      - name: Show generated asset diff
        if: steps.data_diff.outputs.changed == 'true'
        run: git status --short pages/schedule/generated

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pages/schedule/generated

          if git diff --cached --quiet; then
            echo "No generated asset changes detected."
            exit 0
          fi

          echo "Committing generated asset changes:"
          git diff --cached --name-status
          git commit -m "$(python3 scripts/print_schedule_commit_message.py)"
          git push "https://${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}

      - name: Post schedule to Discord
        if: steps.data_diff.outputs.changed == 'true'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
        run: python3 scripts/post_schedule_to_discord.py
