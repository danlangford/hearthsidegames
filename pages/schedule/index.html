<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Schedule — Hearthside Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'HearthLexendExaVF';
      src: url('../HearthLexendExaVF.ttf') format('truetype');
    }
  </style>
  <link rel="stylesheet" href="schedule.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 2L24.5 14.5L37 17L27 27L29.5 40L20 33.5L10.5 40L13 27L3 17L15.5 14.5L20 2Z" fill="url(#star-grad)" stroke="url(#star-stroke)" stroke-width="1"/>
          <defs>
            <linearGradient id="star-grad" x1="20" y1="2" x2="20" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FFD700"/>
              <stop offset="1" stop-color="#B8860B"/>
            </linearGradient>
            <linearGradient id="star-stroke" x1="20" y1="2" x2="20" y2="40" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FFE44D"/>
              <stop offset="1" stop-color="#8B6914"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="logo-text">
          <h1>Weekly Schedule</h1>
          <span class="logo-sub">Shareable Generator</span>
        </div>
      </div>
      <a href="../index.html" class="nav-link">← Home</a>
    </header>

    <main class="main">
      <section class="input-section">
        <label class="input-label">Generate This Week's Schedule</label>
        <p class="input-hint" style="margin-bottom: 1rem;">
          Fetches events from both Google Calendars (Leagues + Spotlight) and generates an Instagram Story for the coming week.
        </p>
        <div class="input-actions">
          <button id="generate-btn" class="btn btn-primary">Generate Schedule</button>
        </div>
      </section>

      <section class="preview-section" id="preview-section" style="display:none;">
        <div class="preview-container">
          <div class="preview-frame">
            <canvas id="story-canvas" width="1080" height="1920"></canvas>
          </div>
          <div class="preview-actions">
            <button id="download-btn" class="btn btn-gold">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 12.75L4.5 8.25H7.5V2.25H10.5V8.25H13.5L9 12.75Z" fill="currentColor"/><path d="M15 14.25H3V15.75H15V14.25Z" fill="currentColor"/></svg>
              Download Story
            </button>
            <button id="copy-btn" class="btn btn-outline">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="6" y="6" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 12V3.75C3 3.33579 3.33579 3 3.75 3H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
              Copy to Clipboard
            </button>
            <div id="status-msg" class="status-msg"></div>
            <div id="event-summary" class="event-summary"></div>
          </div>
        </div>
      </section>

      <section class="empty-state" id="empty-state">
        <div class="empty-icon">📅</div>
        <p>Hit Generate to pull this week's events and create a shareable schedule</p>
        <p class="empty-sub">1080 × 1920 — ready to share</p>
      </section>
    </main>
  </div>

  <script src="schedule.js"></script>
</body>
</html>
